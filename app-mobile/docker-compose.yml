services:
  app-mobile:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      EXPO_NO_TELEMETRY: "1"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:docker
