<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F4440A" />
    <meta name="description" content="Cantine Connectée - Plateforme de restauration intelligente" />
    <meta property="og:title" content="Cantine Connectée" />
    <meta property="og:description" content="Plateforme de restauration intelligente et connectée" />
    <meta property="og:image" content="./logo.png" />
    <meta property="og:type" content="website" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./logo.ico" />
    <link rel="apple-touch-icon" href="./logo.png" />
    <link rel="manifest" href="./manifest.json" />
    
    <title>Cantine Connectée</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background-color: #f8f7f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      
      /* Splash Screen / Loading */
      .loading-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #FFF8F2 0%, #f8f7f5 100%);
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
      }
      
      .logo-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
        animation: fadeIn 0.8s ease-in-out;
      }
      
      .logo-wrapper img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        animation: scaleIn 0.6s ease-out;
      }
      
      .brand-name {
        font-size: 28px;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 8px;
        text-align: center;
        animation: fadeIn 1s ease-in-out 0.2s backwards;
        letter-spacing: 0.5px;
      }
      
      .brand-tagline {
        font-size: 14px;
        color: #94A3B8;
        font-weight: 500;
        text-align: center;
        animation: fadeIn 1s ease-in-out 0.4s backwards;
      }
      
      .spinner {
        margin-top: 40px;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(244, 140, 37, 0.1);
        border-top-color: #F4440A;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes scaleIn {
        from { 
          opacity: 0; 
          transform: scale(0.8);
        }
        to { 
          opacity: 1; 
          transform: scale(1);
        }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Hide loading screen once React is mounted */
      #root:not(:empty) ~ .loading-container {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <div class="loading-container">
      <div class="logo-wrapper">
        <img src="./logo.png" alt="Cantine Connectée" />
      </div>
      <div class="brand-name">Cantine Connectée</div>
      <div class="brand-tagline">Plateforme de restauration intelligente</div>
      <div class="spinner"></div>
    </div>
    <script>
      (function () {
        var attempts = 0;
        var maxAttempts = 40;
        function hideLoader() {
          var root = document.getElementById("root");
          var loader = document.querySelector(".loading-container");
          if (!loader) return;
          if ((root && root.childNodes && root.childNodes.length > 0) || attempts >= maxAttempts) {
            loader.style.display = "none";
            return;
          }
          attempts += 1;
          setTimeout(hideLoader, 100);
        }
        hideLoader();
      })();
    </script>
  </body>
</html>
